<script>
   


      function mode() {

      const Pages = document.querySelectorAll(".page");
      for (let i = 0; i < Pages.length; i++) {
        Pages[i].classList.toggle("white2"),
        Pages[i].classList.toggle("dark")
      };

      const p = document.querySelectorAll("p");
      for (let i = 0; i < p.length; i++) {
          p[i].classList.toggle("dark2"),
          p[i].classList.toggle("white")
        };

      const hr = document.querySelectorAll("hr");
      for (let i = 0; i < hr.length; i++) {
          hr[i].classList.toggle("grey"),
          hr[i].classList.toggle("dark2")
        };

      const navi = document.querySelectorAll(".navi");
      for (let i = 0; i < navi.length; i++) {
          navi[i].classList.toggle("white"),
          navi[i].classList.toggle("dark2")
        };

      moder = document.querySelector("#mode");{
          moder.classList.toggle("white"),
          moder.classList.toggle("dark2")
        };
  }

const config = [css = 'default', icon = 'fontawesome']
 const configstate = 'defined'
</script>
